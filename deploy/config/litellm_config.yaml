# LiteLLM Proxy Configuration for vLLM Ascend Dashboard
#
# 这个 LiteLLM 实例作为 Claude Code CLI 的 API 翻译网关。
# Claude Code CLI 发送 Anthropic Messages API 格式的请求到 LiteLLM，
# LiteLLM 翻译后转发到配置的上游 provider（OpenAI / Qwen / DeepSeek ...）。
#
# 模型列表可通过 LiteLLM 的 /model/new API 动态注册，
# 后端服务在启动时自动同步数据库中的 provider 配置。

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

model_list: []

litellm_settings:
  # 启用 Anthropic 格式兼容端点
  drop_params: true
  # 日志级别
  success_callback: ["generic"]
  failure_callback: ["generic"]

router_settings:
  disable_responses_api: true
  num_retries: 1
  request_timeout: 600
