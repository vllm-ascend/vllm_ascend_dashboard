<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vLLM Ascend 运行报告</title>
<style>
  /* Copy base styles from daily_report.html */
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f7fa; color: #333; line-height: 1.6; }
  .container { max-width: 680px; margin: 0 auto; padding: 20px; }
  .header { background: linear-gradient(135deg, #635bff 0%, #3b82f6 100%); padding: 30px; border-radius: 8px 8px 0 0; text-align: center; }
  .header h1 { color: #fff; font-size: 22px; margin: 0; font-weight: 600; }
  .header .date { color: #e0e7ff; font-size: 14px; margin-top: 8px; }
  .section { background: #fff; margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; }
  .section-header { padding: 14px 20px; font-size: 16px; font-weight: 600; color: #1e293b; border-bottom: 2px solid #f1f5f9; }
  .section-body { padding: 16px 20px; }
  .footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 12px; }
  .footer a { color: #635bff; text-decoration: none; }

  /* Markdown content styles */
  .markdown-body h1 { font-size: 20px; font-weight: 700; color: #1e293b; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb; }
  .markdown-body h2 { font-size: 17px; font-weight: 600; color: #1e293b; margin: 18px 0 10px; }
  .markdown-body h3 { font-size: 15px; font-weight: 600; color: #334155; margin: 14px 0 8px; }
  .markdown-body p { margin: 8px 0; line-height: 1.7; }
  .markdown-body ul, .markdown-body ol { margin: 8px 0; padding-left: 24px; }
  .markdown-body li { margin: 4px 0; }
  .markdown-body table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  .markdown-body th { background: #f1f5f9; padding: 8px 12px; text-align: left; border: 1px solid #e2e8f0; font-weight: 600; color: #1e293b; }
  .markdown-body td { padding: 8px 12px; border: 1px solid #e2e8f0; }
  .markdown-body tr:nth-child(even) td { background: #f8fafc; }
  .markdown-body code { background: #f1f5f9; padding: 2px 6px; border-radius: 3px; font-size: 13px; color: #d97706; font-family: 'Courier New', monospace; }
  .markdown-body pre { background: #1e293b; color: #e2e8f0; padding: 14px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
  .markdown-body pre code { background: none; color: inherit; padding: 0; }
  .markdown-body blockquote { border-left: 4px solid #635bff; padding: 8px 16px; margin: 12px 0; background: #f8fafc; color: #475569; }
  .markdown-body strong { font-weight: 700; color: #1e293b; }
  .markdown-body a { color: #635bff; text-decoration: none; }
  .markdown-body img { max-width: 100%; height: auto; border-radius: 6px; margin: 12px 0; }
  .markdown-body hr { border: none; border-top: 2px solid #e5e7eb; margin: 20px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>vLLM Ascend 运行报告</h1>
    <div class="date">{{ report_date }}</div>
  </div>

  <div class="section">
    <div class="section-header">📊 每日运行报告</div>
    <div class="section-body markdown-body">
      {{ ai_report_html | safe }}
    </div>
  </div>

  {% if chart_cids %}
  <div class="section">
    <div class="section-header">📈 数据图表</div>
    <div class="section-body">
      {% for cid in chart_cids %}
      <img src="cid:{{ cid }}" alt="{{ cid }}" style="max-width:100%; margin-bottom:16px; border-radius:6px; display:block;">
      {% endfor %}
    </div>
  </div>
  {% endif %}

  <div class="footer">
    <p>vLLM Ascend Dashboard · <a href="{{ dashboard_url }}">查看完整看板</a></p>
  </div>
</div>
</body>
</html>
